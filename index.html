    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(120deg, #74ebd5, #acb6e5);
            transition: 0.3s;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
        .dark {
            background: #111;
            color: white;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            width: 300px;
        }
    </style>
</head>

<body id="body">

<div class="container">
    <h1>Тестовая страница</h1>
    <p>Проверка работы метрики</p>

    <!-- КЛИКИ -->
    <div class="card">
        <h3>Клики</h3>
        <button onclick="clickMe()">Кликни</button>
        <p id="clickCount">0</p>
    </div>

    <!-- ТУМБЛЕР -->
    <div class="card">
        <h3>Тема</h3>
        <button onclick="toggleTheme()">Переключить тему</button>
    </div>

    <!-- INPUT -->
    <div class="card">
        <h3>Поле ввода</h3>
        <input id="input" placeholder="Напиши что-нибудь">
        <button onclick="saveText()">Сохранить</button>
        <p id="savedText"></p>
    </div>

    <!-- CHECKBOX -->
    <div class="card">
        <h3>Чекбокс</h3>
        <label>
            <input type="checkbox" onchange="toggleCheck(this)">
            Согласен
        </label>
        <p id="checkStatus">Не выбран</p>
    </div>

    <!-- SELECT -->
    <div class="card">
        <h3>Выбор</h3>
        <select onchange="selectOption(this)">
            <option>JS</option>
            <option>React</option>
            <option>Next.js</option>
        </select>
        <p id="selected"></p>
    </div>

    <!-- ССЫЛКИ -->
    <div class="card">
        <h3>Ссылки</h3>
        <a href="https://github.com" target="_blank">GitHub</a><br>
        <a href="https://google.com" target="_blank">Google</a>
    </div>

    <!-- СКРОЛЛ -->
    <div class="card" style="height:150px; overflow:auto;">
        <p>Скролль меня 👇</p>
        <div style="height:600px;"></div>
    </div>

</div>

<script>
    let clicks = 0;

    function clickMe() {
        clicks++;
        document.getElementById("clickCount").innerText = clicks;
    }

    function toggleTheme() {
        document.getElementById("body").classList.toggle("dark");
    }

    function saveText() {
        const val = document.getElementById("input").value;
        document.getElementById("savedText").innerText = val;
    }

    function toggleCheck(el) {
        document.getElementById("checkStatus").innerText =
            el.checked ? "Выбран" : "Не выбран";
    }

    function selectOption(el) {
        document.getElementById("selected").innerText =
            "Выбрано: " + el.value;
    }
</script>

</body>
</html>
